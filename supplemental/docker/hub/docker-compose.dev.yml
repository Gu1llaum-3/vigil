services:
  vigil:
    build:
      context: ../../..
      dockerfile: internal/dockerfile_hub
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
    image: vigil:dev
    container_name: vigil
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - vigil_data:/vigil_data

volumes:
  vigil_data:

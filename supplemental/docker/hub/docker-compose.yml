services:
  vigil:
    # Published by CI to GHCR. Pinned to an explicit version so the running image does not
    # silently change identity on `docker compose pull` (a floating :latest moves with every
    # release). Bump this to the version you are deploying; for the strongest guarantee pin
    # by digest instead (image: 'ghcr.io/gu1llaum-3/vigil@sha256:<digest>').
    image: 'ghcr.io/gu1llaum-3/vigil:v0.2.0-beta.14'
    container_name: 'vigil'
    restart: unless-stopped
    ports:
      - '8090:8090'
    # Conservative resource ceilings so a runaway hub (DB growth, retention jobs)
    # cannot starve the host. Tune for your deployment.
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    volumes:
      # Named volume works out of the box with the non-root image user (uid 10001).
      # To use a host bind mount instead, create the directory and chown it to
      # 10001:10001 first, e.g. `mkdir -p ./vigil_data && chown 10001:10001 ./vigil_data`.
      - vigil_data:/vigil_data

volumes:
  vigil_data:

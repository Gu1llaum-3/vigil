services:
  vigil:
    # Published by CI to GHCR. Pinned to an explicit version so the running image does not
    # silently change identity on `docker compose pull` (a floating :latest moves with every
    # release). Bump this to the version you are deploying; for the strongest guarantee pin
    # by digest instead (image: 'ghcr.io/gu1llaum-3/vigil@sha256:<digest>').
    image: 'ghcr.io/gu1llaum-3/vigil:v0.2.0-beta.14'
    container_name: 'vigil'
    restart: unless-stopped
    ports:
      - '8090:8090'
    # Runtime hardening. The image already runs as a non-root uid (10001) with a single
    # static binary, so locking it down further is cheap:
    #   - no-new-privileges blocks privilege escalation via setuid/file-caps;
    #   - cap_drop ALL removes the default capability set, and NET_RAW is added back only
    #     because the hub's ICMP "ping" monitor relies on the setcap'd ping binary (verified:
    #     ping still works with this exact combination). Drop NET_RAW if you don't use ping monitors.
    security_opt:
      - 'no-new-privileges:true'
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    # Optional, stronger: a read-only root filesystem with only the data volume writable.
    # PocketBase may use /tmp for scratch, so a tmpfs is provided. Smoke-test your full flow
    # (uploads, OAuth, backups) before enabling in production.
    # read_only: true
    # tmpfs:
    #   - /tmp
    # Conservative resource ceilings so a runaway hub (DB growth, retention jobs)
    # cannot starve the host. Tune for your deployment.
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    volumes:
      # Named volume works out of the box with the non-root image user (uid 10001).
      # To use a host bind mount instead, create the directory and chown it to
      # 10001:10001 first, e.g. `mkdir -p ./vigil_data && chown 10001:10001 ./vigil_data`.
      - vigil_data:/vigil_data

volumes:
  vigil_data:

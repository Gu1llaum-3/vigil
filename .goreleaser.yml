version: 2

project_name: vigil

before:
  hooks:
    - go mod tidy

builds:
  - id: vigil
    binary: vigil
    main: internal/cmd/hub/hub.go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Gu1llaum-3/vigil.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64

  - id: vigil-agent
    binary: vigil-agent
    main: internal/cmd/agent/agent.go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Gu1llaum-3/vigil.Version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7

archives:
  - id: vigil-agent
    formats: [tar.gz]
    ids:
      - vigil-agent
    name_template: >-
      {{ .Binary }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: vigil
    formats: [tar.gz]
    ids:
      - vigil
    name_template: >-
      {{ .Binary }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: vigil-agent
    package_name: vigil-agent
    description: |-
      Agent for Vigil
      Vigil is a hub/agent patch audit application built on PocketBase.
    maintainer: Gu1llaum-3 <guillaume.archambault@easyparapharmacie.com>
    section: net
    ids:
      - vigil-agent
    formats:
      - deb
    contents:
      - src: ./supplemental/debian/vigil-agent.service
        dst: lib/systemd/system/vigil-agent.service
        packager: deb
      - src: ./supplemental/debian/copyright
        dst: usr/share/doc/vigil-agent/copyright
        packager: deb
      - src: ./supplemental/debian/lintian-overrides
        dst: usr/share/lintian/overrides/vigil-agent
        packager: deb
    scripts:
      postinstall: ./supplemental/debian/postinstall.sh
      preremove: ./supplemental/debian/prerm.sh
      postremove: ./supplemental/debian/postrm.sh
    deb:
      predepends:
        - adduser
        - debconf
      scripts:
        templates: ./supplemental/debian/templates
        config: ./supplemental/debian/config.sh

release:
  prerelease: auto
  make_latest: true
  draft: false
  replace_existing_artifacts: true

# Keyless (OIDC) signing of the checksums file with cosign. The release workflow
# installs cosign and runs with `id-token: write`, so no private key is needed.
# Verify with:
#   cosign verify-blob --certificate vigil_<ver>_checksums.txt.pem \
#     --signature vigil_<ver>_checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/Gu1llaum-3/vigil/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     vigil_<ver>_checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - '--yes'

changelog:
  disable: true
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
